name: "Url Downloader"

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct file URL (comma-separated for multiple)"
        required: true
        type: string
      custom_filename:
        description: "Custom output name (comma-separated for multiple)"
        required: false
        default: ""
        type: string
      zip_password:
        description: "Password for 7z archive (empty = no password)"
        required: false
        default: ""
        type: string
      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release
      release_name:
        description: "Release name (if upload_method=release)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full

      - name: Download file with aria2
        run: |
          URLS_STR="${{ github.event.inputs.file_url }}"
          CUSTOMS_STR="${{ github.event.inputs.custom_filename }}"
          mkdir -p tmp_downloads
          cd tmp_downloads
          
          IFS=',' read -ra URLS <<< "$URLS_STR"
          IFS=',' read -ra CUSTOMS <<< "$CUSTOMS_STR"
          
          for i in "${!URLS[@]}"; do
            URL=$(echo "${URLS[$i]}" | xargs)
            [ -z "$URL" ] && continue
            
            NAME=""
            if [ $i -lt ${#CUSTOMS[@]} ]; then
              NAME=$(echo "${CUSTOMS[$i]}" | xargs)
            fi
            
            if [ -n "$NAME" ]; then
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M --out="$NAME" "$URL"
            else
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M --content-disposition=true "$URL"
            fi
          done
          
          cd ..
          ALL_FILES=$(ls -1 tmp_downloads | paste -sd "," -)
          echo "FILENAME=$ALL_FILES" >> $GITHUB_ENV
          echo "UPLOAD_METHOD=${{ github.event.inputs.upload_method }}" >> $GITHUB_ENV

      - name: Create 7z archive
        run: |
          cd tmp_downloads
          PASS="${{ github.event.inputs.zip_password }}"
          UPLOAD_METHOD="${{ github.event.inputs.upload_method }}"
          if [ "$UPLOAD_METHOD" = "repository" ]; then
            THRESH_MB=90
          else
            THRESH_MB=2000
          fi
          
          for FILE in *; do
            [ -f "$FILE" ] || continue
            
            SIZE_BYTES=$(stat -c%s "$FILE")
            SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
            NEED_ARCHIVE=false
            if [ "$SIZE_MB" -gt "$THRESH_MB" ] || [ -n "$PASS" ]; then
              NEED_ARCHIVE=true
            fi
            
            if [ "$NEED_ARCHIVE" = false ]; then
              mkdir -p ../downloads
              cp "$FILE" ../downloads/
              continue
            fi
            
            ARCHIVE_BASE="${FILE%.*}_$(date +%Y%m%d_%H%M%S)"
            if [ -n "$PASS" ]; then
              7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$FILE"
            else
              7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$FILE"
            fi
            
            if [ -f "${ARCHIVE_BASE}.7z.001" ] && [ ! -f "${ARCHIVE_BASE}.7z.002" ]; then
              mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
            fi
            mkdir -p ../downloads
            mv ${ARCHIVE_BASE}.7z* ../downloads/
            rm -f "$FILE"
          done
          cd ..

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tag-${{ github.run_number }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || 'Download from workflow' }}
          body: |
            File: ${{ env.FILENAME }}
            Password: ${{ github.event.inputs.zip_password != '' && 'set' || 'none' }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to repository
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files [skip ci]" || echo "Nothing to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

      - name: Cleanup
        if: always()
        run: rm -rf tmp_downloads downloads